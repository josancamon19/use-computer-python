repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-format
      - id: ruff-check
        args: [--fix]

  - repo: local
    hooks:
      - id: ty-check
        name: ty check
        entry: uv run --group dev ty check .
        language: system
        pass_filenames: false
